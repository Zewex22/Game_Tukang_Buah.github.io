
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
#gw{display:flex;flex-direction:column;align-items:center;width:100%;background:#1a0a2e;min-height:600px;padding-bottom:8px;}
#hud{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:400px;padding:8px 14px;background:#2d1557;color:#FFE066;font-family:'Courier New',monospace;font-size:13px;font-weight:bold;}
.hud-block{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-size:10px;color:#9b8fc0;letter-spacing:1px;}
.hud-val{font-size:16px;color:#FFE066;}
#hp-row{display:flex;gap:3px;}
.heart{font-size:16px;transition:transform 0.2s;}
.heart.full{color:#FF4444;}
.heart.empty{color:#442244;}
#canvas-wrap{position:relative;width:100%;max-width:400px;}
#gc{display:block;width:100%;image-rendering:pixelated;touch-action:none;}
#overlay{position:absolute;inset:0;background:rgba(10,4,30,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;border-radius:0 0 8px 8px;}
#overlay h2{font-family:'Courier New',monospace;font-size:20px;color:#FFE066;letter-spacing:2px;}
#overlay .sub{font-family:'Courier New',monospace;font-size:11px;color:#9b8fc0;letter-spacing:1px;}
#overlay .final-score{font-family:'Courier New',monospace;font-size:28px;color:#FFE066;font-weight:bold;}
#overlay .final-label{font-family:'Courier New',monospace;font-size:11px;color:#9b8fc0;}
#pbtn{background:#4CAF50;color:#fff;border:none;padding:12px 36px;font-family:'Courier New',monospace;font-size:15px;font-weight:bold;cursor:pointer;border-radius:6px;letter-spacing:2px;margin-top:6px;active:scale(0.97);}
#pbtn:active{transform:scale(0.96);}
#pbtn.red{background:#e74c3c;}
#controls{display:flex;justify-content:space-between;width:100%;max-width:400px;padding:10px 12px;gap:8px;background:#2d1557;}
.cbtn{flex:1;height:64px;background:#3d2070;border:2px solid #6040a0;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;color:#FFE066;active:scale(0.95);}
.cbtn:active{background:#5030a0;transform:scale(0.95);}
#combo-display{position:absolute;top:6px;left:50%;transform:translateX(-50%);font-family:'Courier New',monospace;font-size:13px;font-weight:bold;color:#FFD700;pointer-events:none;opacity:0;transition:opacity 0.3s;text-shadow:0 0 6px #FFD700;}
#floats{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
</style>

<div id="gw">
  <div id="hud">
    <div class="hud-block">
      <span class="hud-label">SKOR</span>
      <span class="hud-val" id="sv">0</span>
    </div>
    <div class="hud-block">
      <span class="hud-label">LEVEL</span>
      <span class="hud-val" id="lv">1</span>
    </div>
    <div class="hud-block">
      <span class="hud-label">HP</span>
      <div id="hp-row">
        <span id="h1" class="heart full">♥</span>
        <span id="h2" class="heart full">♥</span>
        <span id="h3" class="heart full">♥</span>
      </div>
    </div>
    <div class="hud-block">
      <span class="hud-label">COMBO</span>
      <span class="hud-val" id="cv">x1</span>
    </div>
  </div>

  <div id="canvas-wrap">
    <canvas id="gc"></canvas>
    <div id="combo-display"></div>
    <div id="floats"></div>
    <div id="overlay">
      <div style="font-size:36px;">🍎</div>
      <h2>TUKANG BUAH</h2>
      <div class="sub">TANGKAP BUAH — HINDARI SAMPAH</div>
      <div style="height:8px;"></div>
      <div id="fs-block" style="display:none;flex-direction:column;align-items:center;gap:2px;">
        <div class="final-label">SKOR AKHIR</div>
        <div class="final-score" id="fs">0</div>
      </div>
      <button id="pbtn" onclick="startGame()">▶ MULAI</button>
      <div class="sub" style="margin-top:4px;">Tombol bawah atau geser layar</div>
    </div>
  </div>

  <div id="controls">
    <div class="cbtn" id="btn-left">◀</div>
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:#6040a0;font-family:monospace;font-size:10px;">
      <span>GERAK</span>
    </div>
    <div class="cbtn" id="btn-right">▶</div>
  </div>
</div>

<script>
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvas-wrap');

let CW, CH, scale;
function resize() {
  const w = Math.min(wrap.clientWidth, 400);
  canvas.width = 360;
  canvas.height = 480;
  canvas.style.width = w + 'px';
  canvas.style.height = (w * 480/360) + 'px';
  CW = 360; CH = 480;
}
resize();

const GROUND = CH - 24;
let score=0, hp=3, level=1, combo=1, comboTimer=0, gameRunning=false;
let player, items=[], particles=[], frameCount=0, lastTime=0, keys={};
let bestScore = 0;

const FRUITS = [
  {em:'🍎',type:'fruit',pts:1},{em:'🍊',type:'fruit',pts:1},
  {em:'🍇',type:'fruit',pts:2},{em:'🍌',type:'fruit',pts:1},
  {em:'🍓',type:'fruit',pts:1},{em:'🍍',type:'fruit',pts:3},
];
const TRASH = [
  {em:'🥫',type:'trash',dmg:1},{em:'💀',type:'trash',dmg:1},
  {em:'💣',type:'bomb',dmg:2},{em:'🗑️',type:'trash',dmg:1},
];
const BONUS = [{em:'⭐',type:'bonus',pts:5},{em:'💎',type:'bonus',pts:8}];

function spawnParticle(x,y,text,color){
  const el=document.createElement('div');
  el.style.cssText=`position:absolute;left:${x}px;top:${y}px;transform:translate(-50%,-50%);font-family:monospace;font-size:14px;font-weight:bold;color:${color};pointer-events:none;transition:top 0.7s,opacity 0.7s;opacity:1;`;
  el.textContent=text;
  document.getElementById('floats').appendChild(el);
  const scaleRatio = canvas.clientWidth / CW;
  el.style.left = (x * scaleRatio) + 'px';
  el.style.top = (y * scaleRatio) + 'px';
  setTimeout(()=>{el.style.top=(y*scaleRatio-40)+'px';el.style.opacity='0';},50);
  setTimeout(()=>el.remove(),800);
}

function drawBg(){
  ctx.fillStyle='#0d0520';
  ctx.fillRect(0,0,CW,CH);
  ctx.fillStyle='#1a0a2e';
  ctx.fillRect(0,0,CW,CH-80);
  for(let i=0;i<30;i++){
    const sx=(i*47+frameCount*0.2)%CW;
    const sy=(i*31)%(CH-80);
    ctx.fillStyle=`rgba(255,255,255,${0.3+Math.sin(i+frameCount*0.05)*0.2})`;
    ctx.fillRect(sx,sy,1,1);
  }
  ctx.fillStyle='#2a5c0a';
  ctx.fillRect(0,GROUND,CW,CH-GROUND);
  ctx.fillStyle='#1e4508';
  for(let i=0;i<CW;i+=18){ctx.fillRect(i,GROUND,9,2);}
  ctx.fillStyle='#ffd700';
  ctx.beginPath();ctx.arc(CW-50,40,22,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ffe44d';
  ctx.beginPath();ctx.arc(CW-50,40,18,0,Math.PI*2);ctx.fill();
}

function drawPlayer(){
  const p=player;
  const bx=Math.round(p.x-p.w/2), by=Math.round(GROUND-p.h);
  ctx.font='12px serif';ctx.textAlign='center';
  ctx.fillStyle='#784212';ctx.fillRect(bx+3,by+28,(p.w-6)/2,8);
  ctx.fillRect(bx+3+(p.w-6)/2,by+28,(p.w-6)/2,8);
  ctx.fillStyle='#111';ctx.fillRect(bx+2,by+36,(p.w-8)/2+2,5);
  ctx.fillRect(bx+(p.w/2)+1,by+36,(p.w-8)/2+2,5);
  ctx.fillStyle='#c0392b';ctx.fillRect(bx+3,by+14,p.w-6,14);
  ctx.fillStyle='#F5CBA7';ctx.fillRect(bx+5,by+2,p.w-10,12);
  ctx.fillStyle='#2c3e50';
  if(p.facing>0){ctx.fillRect(bx+p.w-10,by+5,2,2);}
  else{ctx.fillRect(bx+6,by+5,2,2);}
  ctx.fillStyle='#F1C40F';ctx.fillRect(bx+1,by,p.w-2,4);
  ctx.fillRect(bx+4,by+4,p.w-8,2);
  ctx.fillStyle='#C8964A';
  const bkx = p.facing>0 ? bx+p.w-6 : bx-12;
  ctx.fillRect(bkx,by+14,14,12);
  ctx.fillStyle='#8B5E3C';ctx.fillRect(bkx,by+13,14,2);
  ctx.fillStyle='#FFD700';
  const shine=Math.floor(frameCount/8)%2;
  if(p.moving){ctx.fillRect(bkx+2+shine,by+16,2,2);}
}

function drawItem(it){
  ctx.font=`${it.size}px serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(it.em,it.x,it.y);
  if(it.type==='bonus'){
    ctx.strokeStyle='#FFD700';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(it.x,it.y,it.size/1.5+Math.sin(frameCount*0.15)*2,0,Math.PI*2);ctx.stroke();
  }
}

function collide(it){
  const px=player.x, py=GROUND-player.h/2;
  return Math.abs(it.x-px)<player.w/2+it.size/2.2 && Math.abs(it.y-py)<player.h/2+it.size/2.5;
}

function updateHUD(){
  document.getElementById('sv').textContent=score;
  document.getElementById('lv').textContent=level;
  document.getElementById('cv').textContent='x'+combo;
  ['h1','h2','h3'].forEach((id,i)=>{
    const el=document.getElementById(id);
    el.className='heart '+(i<hp?'full':'empty');
    el.textContent=i<hp?'♥':'♡';
  });
}

function showCombo(x,y){
  if(combo<2)return;
  const el=document.getElementById('combo-display');
  el.textContent='COMBO x'+combo+'!';
  el.style.opacity='1';
  clearTimeout(window._ct);
  window._ct=setTimeout(()=>{el.style.opacity='0';},800);
}

let leftHeld=false,rightHeld=false;
document.getElementById('btn-left').addEventListener('touchstart',e=>{leftHeld=true;e.preventDefault();},{passive:false});
document.getElementById('btn-left').addEventListener('touchend',e=>{leftHeld=false;},{passive:true});
document.getElementById('btn-right').addEventListener('touchstart',e=>{rightHeld=true;e.preventDefault();},{passive:false});
document.getElementById('btn-right').addEventListener('touchend',e=>{rightHeld=false;},{passive:true});
document.getElementById('btn-left').addEventListener('mousedown',()=>leftHeld=true);
document.getElementById('btn-left').addEventListener('mouseup',()=>leftHeld=false);
document.getElementById('btn-right').addEventListener('mousedown',()=>rightHeld=true);
document.getElementById('btn-right').addEventListener('mouseup',()=>rightHeld=false);

let swipeStartX=null;
canvas.addEventListener('touchstart',e=>{swipeStartX=e.touches[0].clientX;},{passive:true});
canvas.addEventListener('touchmove',e=>{
  if(swipeStartX===null)return;
  const dx=e.touches[0].clientX-swipeStartX;
  leftHeld=dx<-8; rightHeld=dx>8;
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchend',()=>{leftHeld=false;rightHeld=false;swipeStartX=null;},{passive:true});
document.addEventListener('keydown',e=>{keys[e.key]=true;if(['ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

function spawnItem(){
  const pool=[...FRUITS];
  if(level>=2)pool.push(...TRASH);
  if(level>=3)pool.push(...TRASH,{em:'💣',type:'bomb',dmg:2});
  if(Math.random()<0.07)pool.push(...BONUS);
  const t=pool[Math.floor(Math.random()*pool.length)];
  items.push({
    ...t,
    x:28+Math.random()*(CW-56),
    y:-24,
    speed:1.5+Math.random()*0.8+level*0.35,
    size:t.type==='bonus'?22:24,
    wobble:Math.random()*Math.PI*2,
    ws:(Math.random()-0.5)*0.06,
  });
}

function gameLoop(ts){
  if(!gameRunning)return;
  const dt=Math.min((ts-lastTime)/16.67,3);
  lastTime=ts;
  frameCount++;

  const movL=leftHeld||keys['ArrowLeft']||keys['a']||keys['A'];
  const movR=rightHeld||keys['ArrowRight']||keys['d']||keys['D'];
  player.moving=movL||movR;
  if(movL){player.x-=player.speed*dt;player.facing=-1;}
  if(movR){player.x+=player.speed*dt;player.facing=1;}
  player.x=Math.max(player.w/2+2,Math.min(CW-player.w/2-2,player.x));

  comboTimer=Math.max(0,comboTimer-dt);
  if(comboTimer<=0&&combo>1){combo=1;updateHUD();}

  const rate=Math.max(50-level*6,20);
  if(frameCount%Math.round(rate)===0)spawnItem();

  items=items.filter(it=>{
    it.wobble+=it.ws;
    it.x+=Math.sin(it.wobble)*0.6;
    it.y+=it.speed*dt;
    if(collide(it)){
      if(it.type==='fruit'){
        const pts=it.pts*combo;
        score+=pts;
        combo=Math.min(combo+1,8);
        comboTimer=120;
        spawnParticle(it.x,it.y-20,'+'+pts,'#2ecc71');
        showCombo(it.x,it.y);
      } else if(it.type==='bonus'){
        const pts=it.pts*combo;
        score+=pts;
        combo=Math.min(combo+1,8);
        comboTimer=150;
        spawnParticle(it.x,it.y-20,'+'+pts+' BONUS!','#FFD700');
        showCombo(it.x,it.y);
      } else if(it.type==='bomb'){
        hp=Math.max(0,hp-it.dmg);
        combo=1;comboTimer=0;
        spawnParticle(it.x,it.y-20,'💥 -'+it.dmg+' HP','#FF4444');
      } else {
        hp=Math.max(0,hp-it.dmg);
        combo=1;comboTimer=0;
        spawnParticle(it.x,it.y-20,'-1 HP','#FF6666');
      }
      updateHUD();
      if(hp<=0){endGame();return false;}
      return false;
    }
    return it.y<CH+30;
  });

  level=1+Math.floor(score/15);

  drawBg();
  items.forEach(drawItem);
  drawPlayer();
  requestAnimationFrame(gameLoop);
}

function startGame(){
  score=0;hp=3;level=1;combo=1;comboTimer=0;items=[];frameCount=0;
  player={x:CW/2,y:0,w:34,h:40,speed:5,facing:1,moving:false};
  document.getElementById('overlay').style.display='none';
  document.getElementById('fs-block').style.display='none';
  gameRunning=true;
  lastTime=performance.now();
  updateHUD();
  requestAnimationFrame(gameLoop);
}

function endGame(){
  gameRunning=false;
  if(score>bestScore)bestScore=score;
  const ov=document.getElementById('overlay');
  ov.style.display='flex';
  document.getElementById('fs-block').style.display='flex';
  document.getElementById('fs').textContent=score;
  const btn=document.getElementById('pbtn');
  btn.textContent='▶ MAIN LAGI';
  btn.className='red';
  const sub=ov.querySelector('.sub:last-child');
  if(sub)sub.textContent='Best: '+bestScore;
}

updateHUD();
</script>
